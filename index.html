<div class="input-section">
  <h3>Fixed income</h3>

  <div class="fixed-income-grid">

    <div class="income-card">
      <label class="field">
        <span class="field-label">State pension (per person)</span>
        <input id="statePensionToday" type="text" inputmode="numeric" data-format="integer" />
      </label>
    </div>

    <div class="income-card">
      <label class="field">
        <span class="field-label">Other income</span>
        <input id="otherIncomeToday" type="text" inputmode="numeric" data-format="integer" />
      </label>

      <label class="field">
        <span class="field-label">Number of years</span>
        <input id="otherIncomeYears" type="number" min="0" step="1" />
      </label>
    </div>

    <div class="income-card">
      <label class="field">
        <span class="field-label">Windfall amount</span>
        <input id="windfallAmount" type="text" inputmode="numeric" data-format="integer" />
      </label>

      <label class="field">
        <span class="field-label">In which year</span>
        <input id="windfallYear" type="number" min="0" step="1" />
      </label>
    </div>

  </div>

  <div class="field-grid">
    <label class="field">
      <span class="field-label">Person 1 age</span>
      <input id="person1Age" type="number" min="18" max="100" step="1" />
    </label>

    <label class="field">
      <span class="field-label">Person 1 pension age</span>
      <input id="person1PensionAge" type="number" min="18" max="100" step="1" />
    </label>

    <label class="field">
      <span class="field-label">Name</span>
      <input id="person1Name" type="text" placeholder="Person 1" />
    </label>

    <label class="field">
      <span class="field-label">Person 2 age</span>
      <input id="person2Age" type="number" min="18" max="100" step="1" />
    </label>

    <label class="field">
      <span class="field-label">Person 2 pension age</span>
      <input id="person2PensionAge" type="number" min="18" max="100" step="1" />
    </label>

    <label class="field">
      <span class="field-label">Name</span>
      <input id="person2Name" type="text" placeholder="Person 2" />
    </label>
  </div>
</div>
