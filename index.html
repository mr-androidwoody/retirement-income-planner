<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enhanced Retirement Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="app-header">
  <h1>Enhanced Retirement Simulator</h1>
</header>

<nav class="tabs">
  <button class="tab-button active" data-tab="inputs">Inputs</button>
  <button class="tab-button" data-tab="results">Results</button>
</nav>

<main class="app-main">

<!-- ============================= -->
<!-- Inputs Tab -->
<!-- ============================= -->

<section id="inputs" class="tab-content active">

<form id="planForm">

<div class="card">
<h2>Core Assumptions</h2>

<label>Retirement Years</label>
<input id="years" type="number">

<label>Initial Portfolio (£)</label>
<input id="initialPortfolio" type="number">

<label>Initial Withdrawal Rate (%)</label>
<input id="initialWithdrawalRate" type="number">

<label>Initial Household Spending (£)</label>
<input id="initialSpending" type="number">

<label>Equities (%)</label>
<input id="equitiesPct" type="number">

<label>Bonds (%)</label>
<input id="bondsPct" type="number">

<label>Cash (%)</label>
<input id="cashPct" type="number">

<label>
<input id="rebalance" type="checkbox">
Annual Rebalancing
</label>

</div>

<div class="card">
<h2>People</h2>

<label>Person 1 Name</label>
<input id="person1Name">

<label>Person 1 Age</label>
<input id="person1Age" type="number">

<label>Person 1 Pension Age</label>
<input id="person1PensionAge" type="number">

<label>Person 2 Name</label>
<input id="person2Name">

<label>Person 2 Age</label>
<input id="person2Age" type="number">

<label>Person 2 Pension Age</label>
<input id="person2PensionAge" type="number">

</div>

<div class="card">
<h2>Income</h2>

<label>State Pension Today (£)</label>
<input id="statePensionToday" type="number">

<label>Other Income Today (£)</label>
<input id="otherIncomeToday" type="number">

<label>Other Income Years</label>
<input id="otherIncomeYears" type="number">

<label>Windfall Amount (£)</label>
<input id="windfallAmount" type="number">

<label>Windfall Year</label>
<input id="windfallYear" type="number">

</div>

<div class="form-actions">
<button id="runSimulation" type="submit">Run Simulation</button>
</div>

</form>

</section>

<!-- ============================= -->
<!-- Results Tab -->
<!-- ============================= -->

<section id="results" class="tab-content">

<div class="card">

<h2>Success Rate</h2>
<div id="successRateIndicator"></div>

</div>

<!-- Portfolio Fan Chart -->

<div class="card">

<h2>Portfolio Projection</h2>

<canvas id="portfolioChart" height="300"></canvas>

</div>

<!-- Survival Probability Chart -->

<div class="card">

<h2>Portfolio Survival Probability</h2>

<canvas id="survivalChart" height="280"></canvas>

</div>

<!-- Spending Chart -->

<div class="card">

<h2>Spending Path</h2>

<canvas id="spendingChart" height="300"></canvas>

</div>

<!-- Results Table -->

<div class="card">

<h2>Yearly Results</h2>

<div class="table-container">
<table id="resultsTable">

<thead>
<tr>
<th>Year</th>
<th>Portfolio Start</th>
<th>Spending</th>
<th>State Pension</th>
<th>Other Income</th>
<th>Windfall</th>
<th>Withdrawals</th>
<th>Portfolio End</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

</div>

</section>

</main>

<script type="module" src="js/app.js"></script>

</body>
</html>
